name: Crawl links

on:
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run crawler
        run: bun ./index.ts